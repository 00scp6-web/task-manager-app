<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager - Register</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="auth-page">
    <div class="auth-container card">
        <h1 class="text-center">Create an Account</h1>
        <p class="text-center subtitle">Sign up to manage your tasks</p>
        
        <div id="register-error" class="error-message"></div>
        
        <form id="register-form">
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" required placeholder="Enter your full name">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="Enter your email">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required minlength="6" placeholder="Create a password (min 6 chars)">
            </div>
            <button type="submit" class="btn btn-primary btn-block">Register</button>
        </form>
        
        <p class="text-center mt-2">
            Already have an account? <a href="index.html">Login here</a>
        </p>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
